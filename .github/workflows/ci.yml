# ============================================================================
# IPSSI_APOCAL_KIT — Pipeline CI GitHub Actions
# ----------------------------------------------------------------------------
# Déclenchement :
#   - push sur main
#   - pull request vers main
#
# 2 jobs en parallèle : backend (Python/Django) et frontend (Node/React).
# Chacun fait lint + tests + génération de l'artefact si nécessaire.
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  # --------------------------------------------------------------------------
  # BACKEND — Django + DRF + tests pytest
  # --------------------------------------------------------------------------
  backend:
    name: Backend (Python / Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: apocal
          POSTGRES_USER: apocal
          POSTGRES_PASSWORD: apocal-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apocal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    env:
      DJANGO_DEBUG: 'False'
      DJANGO_SECRET_KEY: 'ci-only-not-secret'
      DJANGO_ALLOWED_HOSTS: '*'
      POSTGRES_DB: apocal
      POSTGRES_USER: apocal
      POSTGRES_PASSWORD: apocal-ci
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      LLM_BACKEND: mock  # ne pas appeler Ollama en CI

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Lint (black formatter check)
        run: black --check .

      - name: Django check
        run: python manage.py check

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run pytest with coverage
        run: pytest --cov --cov-report=term-missing

      - name: Run adversarial LLM tests
        run: pytest llm/tests.py -q

  # --------------------------------------------------------------------------
  # FRONTEND — React + Vite + tests vitest
  # --------------------------------------------------------------------------
  frontend:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: TypeScript build
        run: npm run build

      - name: Run vitest
        run: npm test -- --run
